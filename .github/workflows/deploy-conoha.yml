name: Deploy to ConoHa WING

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: conoha-wing-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CONOHA_FTP_SERVER }}
          username: ${{ secrets.CONOHA_FTP_USERNAME }}
          password: ${{ secrets.CONOHA_FTP_PASSWORD }}
          port: ${{ secrets.CONOHA_FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.CONOHA_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README_DEPLOY.md
            **/screenshots/**
