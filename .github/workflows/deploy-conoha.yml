name: Deploy to ConoHa WING

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: conoha-wing-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.CONOHA_FTP_SERVER || secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.CONOHA_FTP_USERNAME || secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.CONOHA_FTP_PASSWORD || secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.CONOHA_FTP_PORT || secrets.FTP_PORT || '21' }}
      FTP_REMOTE_DIR: ${{ secrets.CONOHA_REMOTE_DIR || secrets.CONOHA_FTP_REMOTE_DIR || secrets.FTP_REMOTE_DIR || secrets.FTP_SERVER_DIR || 'public_html/dropworld.space/' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load bundled ConoHa secret
        shell: bash
        env:
          CONOHA_DROP: ${{ secrets.CONOHA_DROP }}
        run: |
          if [ -z "$CONOHA_DROP" ]; then
            exit 0
          fi

          write_env() {
            local name="$1"
            local value="$2"
            {
              echo "$name<<__CONOHA_ENV__"
              printf '%s\n' "$value"
              echo "__CONOHA_ENV__"
            } >> "$GITHUB_ENV"
          }

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            key="${line%%=*}"
            value="${line#*=}"
            key="$(printf '%s' "$key" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            value="$(printf '%s' "$value" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

            case "$key" in
              CONOHA_FTP_SERVER|FTP_SERVER)
                write_env FTP_SERVER "$value"
                ;;
              CONOHA_FTP_USERNAME|FTP_USERNAME)
                write_env FTP_USERNAME "$value"
                ;;
              CONOHA_FTP_PASSWORD|FTP_PASSWORD)
                write_env FTP_PASSWORD "$value"
                ;;
              CONOHA_FTP_PORT|FTP_PORT)
                write_env FTP_PORT "$value"
                ;;
              CONOHA_REMOTE_DIR|CONOHA_FTP_REMOTE_DIR|FTP_REMOTE_DIR|FTP_SERVER_DIR)
                write_env FTP_REMOTE_DIR "$value"
                ;;
            esac
          done <<< "$CONOHA_DROP"

      - name: Check FTP settings
        run: |
          missing=0
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_REMOTE_DIR; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing FTP setting::$key is empty. Add the matching repository secret in GitHub Actions."
              missing=1
            fi
          done
          exit "$missing"

      - name: Deploy static site by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ env.FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README_DEPLOY.md
            **/screenshots/**
